<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot Doctor — Search Jobs</title>
  <link rel="stylesheet" href="jobs.css" />
</head>
<body>
  <div id="app">
    <h1>Search Jobs</h1>
    <p class="subtitle">Find a UiPath job by order ID.</p>

    <div id="filters">
      <select id="site"></select>
      <input type="text" id="search" placeholder="Order ID…" />
      <button id="search-btn">Search</button>
    </div>

    <div id="list"><p class="empty">Enter an order ID and search.</p></div>
  </div>
  <script src="jobs.js"></script>
</body>
</html>
