<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="16" y="20" width="96" height="88" rx="10" fill="#334155" stroke="#475569" stroke-width="2"/>
  <!-- Terminal title bar dots -->
  <circle cx="32" cy="36" r="4" fill="#ef4444"/>
  <circle cx="48" cy="36" r="4" fill="#f59e0b"/>
  <circle cx="64" cy="36" r="4" fill="#22c55e"/>
  <!-- Prompt chevron -->
  <path d="M28 60 l6 6 -6 6" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Blinking cursor -->
  <rect x="36" y="58" width="8" height="2" rx="1" fill="#94a3b8"/>
  <!-- Checkmark line -->
  <path d="M32 80 l4 4 8-8" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Medical cross -->
  <rect x="82" y="70" width="24" height="7" rx="3.5" fill="#3b82f6"/>
  <rect x="89" y="63" width="7" height="24" rx="3.5" fill="#3b82f6"/>
  <!-- Bottom progress bar -->
  <rect x="28" y="96" width="72" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="28" y="96" width="48" height="3" rx="1.5" fill="#22c55e"/>
</svg>
